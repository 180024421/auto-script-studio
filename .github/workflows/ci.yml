name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate-and-lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml opencv-python-headless numpy

      - name: Validate example projects
        run: |
          python -m packager.packager_cli validate examples/ldplayer-test
          python -m packager.packager_cli validate examples/demo-game

      - name: Run unit tests
        run: python -m pytest tests/ -q

  android-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile Android runtime
        working-directory: android-runtime
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon
